<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全球情報中控台 (Global Intelligence Dashboard)</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* 滾動條美化 */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-[#f8fafc] text-slate-800 min-h-screen font-sans">

    <header class="border-b border-slate-200 bg-white/80 backdrop-blur sticky top-0 z-50 px-6 py-4 flex flex-col sm:flex-row justify-between items-center gap-4 shadow-sm">
        <div class="flex items-center gap-3">
            <div class="bg-indigo-600 p-2 rounded-lg text-white animate-pulse">
                <i class="fa-solid fa-satellite-dish text-xl"></i>
            </div>
            <div>
                <h1 class="text-xl font-bold tracking-wide text-slate-900">全球動態情報中控台</h1>
                <p class="text-xs text-slate-500">即時監測 • 股市新聞 • 地緣政治 • 商業情報</p>
            </div>
        </div>
        <div class="flex items-center gap-3">
            <button onclick="fetchAllFeeds()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg text-sm font-medium transition-all shadow-md shadow-indigo-600/10 flex items-center gap-2 cursor-pointer">
                <i class="fa-solid fa-rotate animate-spin-hover"></i> 立即同步數據
            </button>
            <span id="update-time" class="text-xs text-slate-600 bg-slate-100 px-3 py-2 rounded-lg border border-slate-200">未同步</span>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-4 sm:p-6 space-y-6">
        
        <div class="flex border-b border-slate-200 gap-2 overflow-x-auto pb-px">
            <button onclick="switchTab('all')" id="tab-all" class="tab-btn px-5 py-3 text-sm font-medium border-b-2 border-indigo-600 text-indigo-600 whitespace-nowrap transition-all cursor-pointer">
                <i class="fa-solid fa-grid-2x2 mr-2"></i>全部情報
            </button>
            <button onclick="switchTab('stocks')" id="tab-stocks" class="tab-btn px-5 py-3 text-sm font-medium border-b-2 border-transparent text-slate-500 hover:text-slate-800 whitespace-nowrap transition-all cursor-pointer">
                <i class="fa-solid fa-chart-line mr-2 text-emerald-600"></i>股市新聞
            </button>
            <button onclick="switchTab('geopolitics')" id="tab-geopolitics" class="tab-btn px-5 py-3 text-sm font-medium border-b-2 border-transparent text-slate-500 hover:text-slate-800 whitespace-nowrap transition-all cursor-pointer">
                <i class="fa-solid fa-earth-americas mr-2 text-amber-600"></i>地緣政治
            </button>
            <button onclick="switchTab('business')" id="tab-business" class="tab-btn px-5 py-3 text-sm font-medium border-b-2 border-transparent text-slate-500 hover:text-slate-800 whitespace-nowrap transition-all cursor-pointer">
                <i class="fa-solid fa-briefcase mr-2 text-indigo-600"></i>商業活動
            </button>
        </div>

        <div id="loading-state" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div class="bg-white border border-slate-200 rounded-xl p-5 animate-pulse space-y-4 shadow-sm">
                <div class="h-4 bg-slate-200 rounded w-1/4"></div>
                <div class="h-6 bg-slate-200 rounded w-3/4"></div>
                <div class="space-y-2">
                    <div class="h-4 bg-slate-200 rounded"></div>
                    <div class="h-4 bg-slate-200 rounded w-5/6"></div>
                </div>
            </div>
            <div class="bg-white border border-slate-200 rounded-xl p-5 animate-pulse space-y-4 shadow-sm">
                <div class="h-4 bg-slate-200 rounded w-1/4"></div>
                <div class="h-6 bg-slate-200 rounded w-3/4"></div>
                <div class="space-y-2">
                    <div class="h-4 bg-slate-200 rounded"></div>
                    <div class="h-4 bg-slate-200 rounded w-5/6"></div>
                </div>
            </div>
            <div class="bg-white border border-slate-200 rounded-xl p-5 animate-pulse space-y-4 shadow-sm">
                <div class="h-4 bg-slate-200 rounded w-1/4"></div>
                <div class="h-6 bg-slate-200 rounded w-3/4"></div>
                <div class="space-y-2">
                    <div class="h-4 bg-slate-200 rounded"></div>
                    <div class="h-4 bg-slate-200 rounded w-5/6"></div>
                </div>
            </div>
        </div>

        <div id="news-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 hidden">
            </div>

        <div id="empty-state" class="hidden text-center py-12 bg-white rounded-xl border border-dashed border-slate-300 shadow-sm">
            <i class="fa-solid fa-folder-open text-slate-400 text-4xl mb-3"></i>
            <p class="text-slate-500 text-sm">目前沒有相關情報，請嘗試重新同步。</p>
        </div>

    </main>

    <script>
        // 定義情報來源 (已將 ABC 新聞更換為 川普官方 Truth Social)
        const FEED_SOURCES = [
            // 股市新聞
            { category: 'stocks', sourceName: '華爾街見聞', url: 'https://rsshub.app/wallstreetcn/news/global' },
            { category: 'stocks', sourceName: 'Finviz 市場新聞', url: 'https://rsshub.app/finviz/news' },
            
            // 地緣政治
            { category: 'geopolitics', sourceName: '聯合國新聞', url: 'https://rsshub.app/un/news/zh/global' },
            { category: 'geopolitics', sourceName: '川普 Truth Social', url: 'https://rsshub.app/truthsocial/users/realDonaldTrump' },
            
            // 商業活動
            { category: 'business', sourceName: '36氪 經濟商業', url: 'https://rsshub.app/36kr/newsflashes' },
            { category: 'business', sourceName: '經理人月刊', url: 'https://rsshub.app/managertoday/post' }
        ];

        let allArticles = [];
        let currentTab = 'all';

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            fetchAllFeeds();
        });

        // 同步所有 RSS 資料
        async function fetchAllFeeds() {
            showLoading(true);
            allArticles = [];
            
            const fetchPromises = FEED_SOURCES.map(async (feed) => {
                try {
                    const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(feed.url)}`;
                    const response = await fetch(proxyUrl);
                    if (!response.ok) throw new Error('網路回應不成功');
                    
                    const data = await response.json();
                    const parser = new DOMParser();
                    const xmlDoc = parser.parseFromString(data.contents, "text/xml");
                    const items = xmlDoc.querySelectorAll("item");
                    
                    items.forEach(item => {
                        const title = item.querySelector("title")?.textContent || "無標題";
                        let link = item.querySelector("link")?.textContent || "#";
                        if (link === "#" && item.querySelector("guid")?.textContent?.startsWith('http')) {
                            link = item.querySelector("guid").textContent;
                        }
                        const description = item.querySelector("description")?.textContent || "無內容摘要。";
                        const pubDateStr = item.querySelector("pubDate")?.textContent || new Date().toISOString();
                        const pubDate = new Date(pubDateStr);

                        allArticles.push({
                            title,
                            link,
                            description: cleanDescription(description),
                            pubDate,
                            category: feed.category,
                            sourceName: feed.sourceName
                        });
                    });
                } catch (error) {
                    console.error(`無法讀取來源 [${feed.sourceName}]:`, error);
                }
            });

            await Promise.all(fetchPromises);
            
            // 降序排序
            allArticles.sort((a, b) => b.pubDate - a.pubDate);
            
            document.getElementById('update-time').innerText = `上次同步: ${new Date().toLocaleTimeString()}`;
            showLoading(false);
            renderArticles();
        }

        function cleanDescription(htmlStr) {
            const doc = new DOMParser().parseFromString(htmlStr, 'text/html');
            let text = doc.body.textContent || "";
            return text.length > 100 ? text.substring(0, 100) + '...' : text;
        }

        // 渲染卡片元件
        function renderArticles() {
            const container = document.getElementById('news-container');
            const emptyState = document.getElementById('empty-state');
            container.innerHTML = '';

            const filtered = currentTab === 'all' 
                ? allArticles 
                : allArticles.filter(a => a.category === currentTab);

            if (filtered.length === 0) {
                container.classList.add('hidden');
                emptyState.classList.remove('hidden');
                return;
            }

            emptyState.classList.add('hidden');
            container.classList.remove('hidden');

            filtered.forEach(article => {
                const badgeColor = getBadgeColor(article.category);
                const categoryName = getCategoryName(article.category);
                const formattedDate = article.pubDate.toLocaleDateString('zh-TW', {
                    month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit'
                });

                const cardHtml = `
                    <div class="bg-white border border-slate-200/80 hover:border-indigo-300 rounded-xl p-5 flex flex-col justify-between transition-all hover:-translate-y-1 hover:shadow-lg hover:shadow-slate-200/50 group shadow-sm">
                        <div class="space-y-3">
                            <div class="flex justify-between items-center text-xs">
                                <span class="px-2.5 py-1 rounded-full font-semibold ${badgeColor}">
                                    ${categoryName} · ${article.sourceName}
                                </span>
                                <span class="text-slate-400 flex items-center gap-1">
                                    <i class="fa-regular fa-clock"></i> ${formattedDate}
                                </span>
                            </div>
                            <h3 class="text-base font-bold text-slate-900 group-hover:text-indigo-600 transition-colors line-clamp-2">
                                <a href="${article.link}" target="_blank" rel="noopener noreferrer">${article.title}</a>
                            </h3>
                            <p class="text-sm text-slate-500 line-clamp-3 leading-relaxed">
                                ${article.description}
                            </p>
                        </div>
                        <div class="pt-4 mt-4 border-t border-slate-100 flex justify-end">
                            <a href="${article.link}" target="_blank" rel="noopener noreferrer" class="text-xs text-indigo-600 hover:text-indigo-700 font-semibold flex items-center gap-1 group-hover:gap-2 transition-all">
                                閱讀原文 <i class="fa-solid fa-arrow-up-right-from-square text-[10px]"></i>
                            </a>
                        </div>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', cardHtml);
            });
        }

        // 頁籤切換邏輯
        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('border-indigo-600', 'text-indigo-600');
                btn.classList.add('border-transparent', 'text-slate-500', 'hover:text-slate-800');
            });

            const activeTab = document.getElementById(`tab-${tab}`);
            activeTab.classList.remove('border-transparent', 'text-slate-500', 'hover:text-slate-800');
            activeTab.classList.add('border-indigo-600', 'text-indigo-600');

            renderArticles();
        }

        function showLoading(isLoading) {
            const loader = document.getElementById('loading-state');
            const container = document.getElementById('news-container');
            const emptyState = document.getElementById('empty-state');

            if (isLoading) {
                loader.classList.remove('hidden');
                container.classList.add('hidden');
                emptyState.classList.add('hidden');
            } else {
                loader.classList.add('hidden');
            }
        }

        function getBadgeColor(cat) {
            switch(cat) {
                case 'stocks': return 'bg-emerald-50 text-emerald-700 border border-emerald-200';
                case 'geopolitics': return 'bg-amber-50 text-amber-700 border border-amber-200';
                case 'business': return 'bg-indigo-50 text-indigo-700 border border-indigo-200';
                default: return 'bg-slate-50 text-slate-700 border border-slate-200';
            }
        }

        function getCategoryName(cat) {
            switch(cat) {
                case 'stocks': return '股市金融';
                case 'geopolitics': return '地緣政治';
                case 'business': return '商業活動';
                default: return '綜合';
            }
        }
    </script>
</body>
</html>
